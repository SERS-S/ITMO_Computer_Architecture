limit: 5000
memory_size: 0x800

memory_mapped_io:
  0x80: [4, 168430090]
  0x84: []

reports:
  - name: Trace
    slice: all
    view: |
      {pc:hex}: {instruction} {pc:label}
      D0={D0:hex} D1={D1:hex} D2={D2:hex} D3={D3:hex}
      D4={D4:hex} D5={D5:hex} D6={D6:hex} D7={D7:hex}
      A0={A0:hex} A1={A1:hex} A2={A2:hex} A3={A3:hex} A4={A4:hex}
      SR={SR:bin}

  - name: Result
    slice: last
    view: |
      in:  {io:0x80:dec}
      out: {io:0x84:dec}
